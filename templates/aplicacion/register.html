<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Renacer Territorial</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS personalizado -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
</head>
<body class="auth">
<div class="overlay">
    <div class="container login-container d-flex align-items-center justify-content-center">
        <div class="card login-card p-4">
            <div class="card-body text-center">
                <h3 class="titulo mb-4">Registro</h3>

                <!-- FORMULARIO DE REGISTRO -->
                <form id="registerForm">
                    <div class="mb-3 text-start">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ingrese su nombre" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Correo</label>
                        <input type="email" name="correo" class="form-control" placeholder="Ingrese su correo" required>
                    </div>
                    <div class="mb-3 text-start">
                        <label class="form-label">Contraseña</label>
                        <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
                    </div>
                    <div class="mb-4 text-start">
                        <label class="form-label">Confirmar Contraseña</label>
                        <input type="password" name="confirmar_password" class="form-control" placeholder="Confirme su contraseña" required>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-success">Registrar</button>
                    </div>
                </form>

                <hr>

                <p>¿Ya tienes cuenta?</p>
                <a href="{{ url_for('auth.login') }}" class="text-success fw-semibold">Iniciar sesión</a>
            </div>
        </div>
    </div>
</div>

<!-- SCRIPT PARA ENVIAR POR FETCH EN JSON -->
<script>
document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        nombre: e.target.nombre.value.trim(),
        correo: e.target.correo.value.trim(),
        password: e.target.password.value,
        confirmar_password: e.target.confirmar_password.value
    };

    try {
        const res = await fetch("/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();
        console.log(result);

        if(result.success){
            alert(result.message);
            window.location.href = "/login"; // Redirige al login
        } else {
            alert(result.message);
        }
    } catch (error) {
        console.error(error);
        alert("Ocurrió un error al registrar el usuario.");
    }
});
</script>

</body>
</html>
