<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Renacer Territorial</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <header style="background-color:#0d3b66;">
        <nav class="container d-flex justify-content-between align-items-center py-3">

            <div class="d-flex align-items-center">

                <!-- Logo -->
                <img src="{{ url_for('static', filename='images/logo.jpg') }}"
                     alt="Logo"
                     width="50"
                     class="me-3">

                <!-- Título -->
                <div style="line-height:1;">
                    <span style="color:#28a745; font-weight:bold;">RENACER</span><br>
                    <span style="color:white; font-weight:bold;">TERRITORIAL</span>
                </div>

            </div>

            <div>
                {% if current_user.is_authenticated %}
                    <span class="text-white me-3">
                        {{ current_user.fullname }}
                    </span>

                    <a href="{{ url_for('auth.logout') }}" class="btn btn-danger btn-sm">
                        Cerrar sesión
                    </a>
                {% endif %}
            </div>

        </nav>
    </header>


    <!-- CONTENIDO -->
    <main class="flex-fill">

        {% block info %}
        {% endblock %}

    </main>


    <!-- FOOTER -->
    <footer style="background-color:#0d3b66;" class="text-white text-center py-3 mt-5">
        <p class="mb-0">
            © 2026 Renacer Territorial - Plataforma de apoyo a víctimas del conflicto
        </p>
    </footer>


    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
